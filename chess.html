<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chess Board</title>
  <style>
    :root {
      --bg: #07140e;
      --panel: #0f2319;
      --panel-2: #132c20;
      --line: #28463a;
      --text: #edf4ef;
      --muted: #a2b7aa;
      --light: #f3efd8;
      --dark: #5e7d69;
      --pick: #98dc8f;
      --danger: #8b2f2f;
      --danger-hover: #a13737;
      --btn: #1d3a2d;
      --btn-hover: #28513e;
      --selected: #f6c85f;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: "Segoe UI", Tahoma, sans-serif;
      background:
        radial-gradient(circle at 25% 0%, #1f4030 0%, #0e2218 40%, #07140e 100%),
        linear-gradient(130deg, #07140e 0%, #081911 100%);
      color: var(--text);
      padding: clamp(10px, 2.8vw, 24px);
    }

    .wrap {
      width: 100%;
      max-width: 1040px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(0, 1.45fr) minmax(0, 1fr);
      gap: clamp(12px, 2vw, 18px);
      align-items: start;
    }

    .board-panel,
    .side-panel {
      background: linear-gradient(180deg, #102619 0%, #0c1f16 100%);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: clamp(12px, 2.2vw, 16px);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    .title {
      margin: 0;
      font-size: clamp(20px, 2.5vw, 26px);
      line-height: 1.1;
      letter-spacing: 0.2px;
    }

    .status {
      margin: 8px 0 14px;
      min-height: 24px;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.2px;
    }

    .status.you-turn {
      color: #c9f9cb;
    }

    .status.waiting {
      color: #b8ccf4;
    }

    .status.error {
      color: #f8b3b3;
    }

    .status.sync {
      color: #cde8db;
    }

    .board-wrap {
      width: 100%;
      max-width: min(92vw, 640px);
      margin: 0 auto;
    }

    .board {
      width: 100%;
      aspect-ratio: 1 / 1;
      display: grid;
      grid-template-columns: repeat(8, minmax(0, 1fr));
      grid-template-rows: repeat(8, minmax(0, 1fr));
      border: 1px solid #345344;
      border-radius: 12px;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
      background: #1e3529;
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.24);
    }

    .sq {
      appearance: none;
      -webkit-appearance: none;
      border: 0;
      margin: 0;
      border-radius: 0;
      padding: 0;
      display: grid;
      place-items: center;
      width: 100%;
      height: 100%;
      cursor: pointer;
      position: relative;
      line-height: 1;
      font-size: clamp(24px, 5.3vw, 44px);
      transition: transform 120ms ease, filter 120ms ease;
    }

    .sq:focus-visible {
      outline: 2px solid #d6f5de;
      outline-offset: -2px;
      z-index: 3;
    }

    .sq.light {
      background: var(--light);
      color: #1a2431;
    }

    .sq.dark {
      background: var(--dark);
      color: #eef7f2;
    }

    .sq.selected {
      box-shadow: inset 0 0 0 3px var(--selected);
      z-index: 2;
    }

    .sq.move::after {
      content: "";
      width: 30%;
      aspect-ratio: 1 / 1;
      border-radius: 999px;
      background: rgba(152, 220, 143, 0.9);
      opacity: 0.9;
      position: absolute;
      pointer-events: none;
    }

    .sq:active {
      transform: scale(0.985);
    }

    .coords {
      margin-top: 9px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.28em;
      font-weight: 600;
      padding: 0 2px;
    }

    .meta {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0));
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 10px;
    }

    .meta p {
      margin: 4px 0;
      color: var(--muted);
      font-size: clamp(13px, 2.7vw, 14px);
      word-break: break-word;
    }

    .meta strong {
      color: var(--text);
    }

    .actions {
      display: flex;
      gap: 9px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    button {
      appearance: none;
      -webkit-appearance: none;
      border: 1px solid #3f6451;
      background: var(--btn);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.2px;
      cursor: pointer;
      transition: background 140ms ease, border-color 140ms ease, opacity 140ms ease;
    }

    button:hover {
      background: var(--btn-hover);
      border-color: #5e866f;
    }

    button:disabled {
      opacity: 0.66;
      cursor: not-allowed;
    }

    .danger {
      border-color: #8d3d3d;
      background: var(--danger);
      color: #ffe8e8;
    }

    .danger:hover {
      background: var(--danger-hover);
      border-color: #aa4f4f;
    }

    .history {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #0a1711;
      max-height: min(56vh, 420px);
      overflow: auto;
    }

    .history-empty {
      color: var(--muted);
      font-size: 14px;
      padding: 12px;
    }

    .history-head,
    .history-row {
      display: grid;
      grid-template-columns: 58px 1fr 1fr;
      gap: 8px;
      align-items: center;
      padding: 8px 10px;
      font-size: 13px;
    }

    .history-head {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #102218;
      color: #cde3d6;
      border-bottom: 1px solid #294434;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .history-row {
      color: #d4e3da;
      border-bottom: 1px solid #1e3428;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 12.5px;
    }

    .history-row:nth-child(even) {
      background: rgba(255, 255, 255, 0.015);
    }

    .history-row:last-child {
      border-bottom: 0;
    }

    .history-turn {
      color: #8fb7a0;
      font-weight: 700;
      text-align: right;
      padding-right: 2px;
    }

    .history-move {
      min-height: 16px;
    }

    @media (max-width: 900px) {
      .wrap {
        grid-template-columns: 1fr;
      }

      .history {
        max-height: min(38vh, 340px);
      }
    }

    @media (max-width: 520px) {
      body {
        padding: 8px;
      }

      .board-panel,
      .side-panel {
        border-radius: 14px;
        padding: 10px;
      }

      .actions button {
        flex: 1 1 auto;
      }

      .history-head,
      .history-row {
        grid-template-columns: 48px 1fr 1fr;
        gap: 6px;
        padding: 7px 8px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="board-panel">
      <h1 class="title">Chess Match</h1>
      <p class="status" id="turnStatus">Loading board...</p>
      <div class="board-wrap">
        <div class="board" id="board"></div>
        <div class="coords">
          <span>a b c d e f g h</span>
          <span>8 7 6 5 4 3 2 1</span>
        </div>
      </div>
    </section>
    <aside class="side-panel">
      <div class="meta">
        <p><strong>Match ID:</strong> <span id="matchId">-</span></p>
        <p><strong>User ID:</strong> <span id="userId">-</span></p>
        <p><strong>Your Color:</strong> <span id="myColor">-</span></p>
      </div>
      <div class="actions">
        <button id="refreshBtn" type="button">Refresh</button>
        <button id="resignBtn" type="button" class="danger">Resign</button>
      </div>
      <div class="history" id="history"></div>
    </aside>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
  <script>
    const PIECES = {
      P: "♙", N: "♘", B: "♗", R: "♖", Q: "♕", K: "♔",
      p: "♟", n: "♞", b: "♝", r: "♜", q: "♛", k: "♚",
    };
    const FILES = ["a", "b", "c", "d", "e", "f", "g", "h"];
    const RANKS = ["8", "7", "6", "5", "4", "3", "2", "1"];
    const INITIAL_FEN = "rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1";

    const params = new URLSearchParams(window.location.search);
    const matchId = (params.get("match_id") || "").trim();
    const userId = (params.get("user_id") || "").trim();

    const boardEl = document.getElementById("board");
    const historyEl = document.getElementById("history");
    const turnStatusEl = document.getElementById("turnStatus");
    const refreshBtn = document.getElementById("refreshBtn");

    document.getElementById("matchId").textContent = matchId || "-";
    document.getElementById("userId").textContent = userId || "-";

    let chess = new Chess();
    let state = null;
    let myColor = null;
    let selectedSquare = null;
    let legalMoves = [];
    let lastFen = "";
    let pollTimer = null;
    let finished = false;
    let syncing = false;
    let pendingForceRefresh = false;
    let stateRequestInFlight = null;

    function sqName(fileIndex, rankIndex) {
      return `${FILES[fileIndex]}${RANKS[rankIndex]}`;
    }

    function parseBoard(fen) {
      const [placement] = fen.split(" ");
      const rows = placement.split("/");
      const result = [];
      for (const row of rows) {
        const expanded = [];
        for (const ch of row) {
          if (/\d/.test(ch)) {
            const count = Number(ch);
            for (let i = 0; i < count; i += 1) expanded.push(null);
          } else {
            expanded.push(ch);
          }
        }
        result.push(expanded);
      }
      return result;
    }

    function renderBoard() {
      boardEl.innerHTML = "";
      const board = parseBoard(chess.fen());
      for (let r = 0; r < 8; r += 1) {
        for (let f = 0; f < 8; f += 1) {
          const square = sqName(f, r);
          const piece = board[r][f];
          const cell = document.createElement("button");
          cell.type = "button";
          cell.className = `sq ${(r + f) % 2 === 0 ? "light" : "dark"}`;
          if (selectedSquare === square) cell.classList.add("selected");
          if (legalMoves.includes(square)) cell.classList.add("move");
          cell.dataset.square = square;
          cell.textContent = piece ? PIECES[piece] : "";
          cell.addEventListener("click", onSquareClick);
          boardEl.appendChild(cell);
        }
      }
    }

    function renderHistory(history) {
      historyEl.innerHTML = "";
      if (!history || history.length === 0) {
        const empty = document.createElement("div");
        empty.className = "history-empty";
        empty.textContent = "No moves yet.";
        historyEl.appendChild(empty);
        return;
      }

      const head = document.createElement("div");
      head.className = "history-head";
      head.innerHTML = "<div>#</div><div>White</div><div>Black</div>";
      historyEl.appendChild(head);

      for (let i = 0; i < history.length; i += 2) {
        const row = document.createElement("div");
        row.className = "history-row";

        const turn = document.createElement("div");
        turn.className = "history-turn";
        turn.textContent = `${Math.floor(i / 2) + 1}.`;

        const white = document.createElement("div");
        white.className = "history-move";
        white.textContent = String(history[i] || "");

        const black = document.createElement("div");
        black.className = "history-move";
        black.textContent = String(history[i + 1] || "");

        row.appendChild(turn);
        row.appendChild(white);
        row.appendChild(black);
        historyEl.appendChild(row);
      }
    }

    function setSyncing(isSyncing) {
      syncing = isSyncing;
      refreshBtn.disabled = isSyncing;
      refreshBtn.textContent = isSyncing ? "Syncing..." : "Refresh";
    }

    function setStatus(text, tone = "") {
      turnStatusEl.textContent = text;
      turnStatusEl.classList.remove("you-turn", "waiting", "error", "sync");
      if (tone) turnStatusEl.classList.add(tone);
    }

    function isMyTurn() {
      if (!state || !myColor) return false;
      return state.turn === myColor;
    }

    function updateTurnStatus() {
      if (finished) return;
      if (!state) {
        setStatus("Loading...", "sync");
        return;
      }
      if (state.status !== "active") {
        setStatus(`Match status: ${state.status}`, "sync");
        return;
      }
      if (!myColor) {
        setStatus("Spectator mode", "sync");
        return;
      }
      if (isMyTurn()) {
        setStatus("Your turn", "you-turn");
      } else {
        setStatus("Opponent's turn", "waiting");
      }
    }

    function clearSelection() {
      selectedSquare = null;
      legalMoves = [];
    }

    function highlightMoves(from) {
      const moves = chess.moves({ square: from, verbose: true });
      legalMoves = moves.map((m) => m.to);
      selectedSquare = from;
    }

    async function postMove(from, to) {
      const move = chess.move({ from, to, promotion: "q" });
      if (!move) return false;
      const uci = `${move.from}${move.to}${move.promotion || ""}`;
      const response = await fetch("/chess_move", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          match_id: matchId,
          user_id: userId,
          move: uci,
          fen: chess.fen(),
        }),
      });
      const payload = await response.json().catch(() => ({}));
      if (!response.ok) {
        chess.undo();
        if (payload.error === "not_your_turn") {
          setStatus("Wait for opponent's move", "waiting");
        } else {
          setStatus("Move rejected by server", "error");
        }
        return false;
      }

      state.fen = payload.fen;
      state.turn = payload.turn;
      if (!Array.isArray(state.move_history)) state.move_history = [];
      state.move_history = [...state.move_history, uci];
      lastFen = payload.fen;
      return true;
    }

    async function postResult(winnerUserId) {
      if (finished) return;
      finished = true;
      await fetch("/chess_result", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          match_id: matchId,
          winner_user_id: winnerUserId,
        }),
      });
    }

    async function handleGameEnd() {
      if (chess.in_checkmate()) {
        const winner = chess.turn() === "w" ? "black" : "white";
        const winnerId = winner === myColor
          ? userId
          : (myColor === "white" ? String(state.opponent_id) : String(state.challenger_id));
        await postResult(winnerId);
        setStatus(winnerId === userId ? "You Won!" : "You Lost", "sync");
        return;
      }
      if (chess.in_stalemate() || chess.in_draw()) {
        await postResult("draw");
        setStatus("Draw. Bets refunded.", "sync");
      }
    }

    async function onSquareClick(event) {
      if (finished || !state || state.status !== "active") return;
      const square = event.currentTarget.dataset.square;
      if (!isMyTurn()) {
        setStatus("Wait for opponent's move", "waiting");
        return;
      }

      const piece = chess.get(square);
      if (!selectedSquare) {
        if (!piece) return;
        const mine = (myColor === "white" && piece.color === "w") || (myColor === "black" && piece.color === "b");
        if (!mine) return;
        highlightMoves(square);
        renderBoard();
        return;
      }

      if (square === selectedSquare) {
        clearSelection();
        renderBoard();
        return;
      }

      const from = selectedSquare;
      const validTarget = legalMoves.includes(square);
      clearSelection();

      if (!validTarget) {
        if (piece) {
          const mine = (myColor === "white" && piece.color === "w") || (myColor === "black" && piece.color === "b");
          if (mine) highlightMoves(square);
        }
        renderBoard();
        return;
      }

      const ok = await postMove(from, square);
      renderBoard();
      if (!ok) return;

      renderHistory((state.move_history || []).map(String));
      updateTurnStatus();
      await handleGameEnd();
    }

    async function loadState(force = false) {
      if (stateRequestInFlight) {
        pendingForceRefresh = pendingForceRefresh || force;
        return stateRequestInFlight;
      }

      stateRequestInFlight = (async () => {
        if (!matchId) {
          setStatus("Missing match_id.", "error");
          return;
        }

        setSyncing(true);
        const response = await fetch(`/chess_state?match_id=${encodeURIComponent(matchId)}&t=${Date.now()}`, {
          cache: "no-store",
          headers: {
            "Cache-Control": "no-cache",
            Pragma: "no-cache",
          },
        });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok || !payload.ok) {
          setStatus("Could not load match.", "error");
          return;
        }

        state = payload;
        if (!state.opponent_id) setStatus("Waiting for opponent to join.", "sync");

        if (String(state.challenger_id) === userId) {
          myColor = state.challenger_color || "white";
        } else if (String(state.opponent_id) === userId) {
          myColor = state.opponent_color || "black";
        } else {
          myColor = null;
        }

        document.getElementById("myColor").textContent = myColor ? myColor : "spectator";

        if (!state.fen) state.fen = INITIAL_FEN;

        if (force || state.fen !== lastFen) {
          chess.load(state.fen);
          lastFen = state.fen;
          clearSelection();
          renderBoard();
        }

        renderHistory((state.move_history || []).map(String));
        updateTurnStatus();
      })();

      try {
        await stateRequestInFlight;
      } catch (_) {
        setStatus("Sync failed. Tap Refresh.", "error");
      } finally {
        stateRequestInFlight = null;
        setSyncing(false);
        if (pendingForceRefresh) {
          const shouldForce = pendingForceRefresh;
          pendingForceRefresh = false;
          void loadState(shouldForce);
        }
      }
    }

    refreshBtn.addEventListener("click", () => {
      void loadState(true);
    });

    document.getElementById("resignBtn").addEventListener("click", async () => {
      if (!state || !myColor || finished) return;
      const ok = window.confirm("Resign this match?");
      if (!ok) return;
      const winnerId = myColor === "white" ? String(state.opponent_id) : String(state.challenger_id);
      await postResult(winnerId);
      setStatus("You resigned.", "sync");
    });

    void loadState(true).then(() => {
      pollTimer = setInterval(() => {
        if (!finished) void loadState(false);
      }, 1800);
    });
  </script>
</body>
</html>
