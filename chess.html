<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chess Board</title>
  <style>
    :root {
      --app-bg: #6a6aa3;
      --app-bg-deep: #595c95;
      --card: #d9d9de;
      --card-line: #47475f;
      --board-wrap: #c6c6cb;
      --board-light: #bcbcbc;
      --board-dark: #8f8f8f;
      --text: #24243a;
      --muted: #5e5f7f;
      --strip-bg: #d6d6db;
      --strip-border: #b5b5be;
      --status-good: #22853d;
      --status-wait: #7a7a98;
      --status-bad: #a13a4b;
      --status-sync: #47537d;
      --selected: #4d64d3;
      --move-dot: #6f84ef;
      --button: #5968b6;
      --button-hover: #4d5cab;
      --button-danger: #a74c4c;
      --button-danger-hover: #944242;
      --history-head: #cfd0da;
      --history-row: #e4e5ea;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: "Trebuchet MS", "Segoe UI", Tahoma, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 50% -8%, #7878b8 0%, var(--app-bg) 45%, var(--app-bg-deep) 100%),
        linear-gradient(180deg, #7a7bb2 0%, #5e6098 100%);
      padding: clamp(10px, 3vw, 24px);
    }

    .shell {
      max-width: 920px;
      margin: 0 auto;
      display: grid;
      gap: 10px;
    }

    .app-head {
      background: #272c44;
      color: #eef1ff;
      border: 1px solid #2f3550;
      border-radius: 14px;
      padding: 10px 14px;
      box-shadow: 0 8px 22px rgba(20, 20, 45, 0.26);
    }

    .app-title {
      margin: 0;
      font-size: clamp(22px, 4.4vw, 34px);
      line-height: 1.05;
      letter-spacing: 0.2px;
    }

    .player-strip {
      background: linear-gradient(180deg, #e4e5ea 0%, var(--strip-bg) 100%);
      border: 1px solid var(--strip-border);
      border-radius: 14px;
      min-height: 84px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      gap: 12px;
    }

    .player-main {
      min-width: 0;
    }

    .player-name {
      margin: 0;
      font-size: clamp(21px, 4.1vw, 38px);
      line-height: 1;
      letter-spacing: 0.2px;
      color: #40408e;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .player-sub {
      margin: 5px 0 0;
      color: #4d4f70;
      font-size: clamp(14px, 2.7vw, 17px);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      border-radius: 7px;
      padding: 2px 8px;
      line-height: 1;
      font-weight: 700;
      font-size: clamp(13px, 2.6vw, 16px);
      color: #eef5ff;
      background: #3f57ae;
    }

    .pill.playing {
      background: var(--status-good);
    }

    .pill.waiting {
      background: #6f7196;
    }

    .pill.offline {
      background: #8f4c4c;
    }

    .board-card {
      background: linear-gradient(180deg, #d6d6db 0%, var(--card) 100%);
      border: 1px solid var(--card-line);
      border-radius: 16px;
      padding: clamp(10px, 2.7vw, 16px);
      box-shadow: 0 12px 30px rgba(27, 27, 48, 0.26);
    }

    .status {
      margin: 0 0 10px;
      min-height: 22px;
      font-size: clamp(14px, 2.9vw, 18px);
      font-weight: 700;
      color: var(--status-sync);
      letter-spacing: 0.2px;
    }

    .status.you-turn {
      color: var(--status-good);
    }

    .status.waiting {
      color: var(--status-wait);
    }

    .status.error {
      color: var(--status-bad);
    }

    .status.sync {
      color: var(--status-sync);
    }

    .board-wrap {
      width: 100%;
      max-width: min(96vw, 690px);
      margin: 0 auto;
      background: linear-gradient(180deg, #d0d1d7 0%, var(--board-wrap) 100%);
      border: 1px solid #9da0b7;
      border-radius: 12px;
      padding: clamp(8px, 1.8vw, 13px);
    }

    .board {
      width: 100%;
      aspect-ratio: 1 / 1;
      display: grid;
      grid-template-columns: repeat(8, minmax(0, 1fr));
      grid-template-rows: repeat(8, minmax(0, 1fr));
      border: 1px solid #80829b;
      border-radius: 8px;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
      box-shadow: 0 4px 12px rgba(37, 38, 53, 0.26);
      background: #9d9da6;
    }

    .sq {
      appearance: none;
      -webkit-appearance: none;
      border: 0;
      margin: 0;
      border-radius: 0;
      padding: 0;
      display: grid;
      place-items: center;
      width: 100%;
      height: 100%;
      cursor: pointer;
      position: relative;
      line-height: 1;
      transition: transform 120ms ease, filter 120ms ease;
      overflow: hidden;
    }

    .sq:focus-visible {
      outline: 2px solid #405ccf;
      outline-offset: -2px;
      z-index: 3;
    }

    .sq.light {
      background: var(--board-light);
      color: #212430;
    }

    .sq.dark {
      background: var(--board-dark);
      color: #f4f5f8;
    }

    .sq.selected {
      box-shadow: inset 0 0 0 3px var(--selected);
      z-index: 2;
    }

    .sq.move::after {
      content: "";
      width: 32%;
      aspect-ratio: 1 / 1;
      border-radius: 999px;
      background: var(--move-dot);
      box-shadow: 0 0 0 2px rgba(72, 82, 138, 0.26);
      opacity: 0.95;
      position: absolute;
      pointer-events: none;
    }

    .piece-img {
      width: 84%;
      height: 84%;
      object-fit: contain;
      pointer-events: none;
      filter: drop-shadow(0 1px 1px rgba(0, 0, 0, 0.28));
    }

    .piece-fallback {
      font-size: clamp(23px, 5.6vw, 48px);
      line-height: 1;
      display: none;
      pointer-events: none;
      text-shadow: 0 1px 1px rgba(0, 0, 0, 0.28);
    }

    .piece-fallback.show {
      display: inline;
    }

    .sq:active {
      transform: scale(0.985);
    }

    .coords {
      margin-top: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--muted);
      font-size: clamp(11px, 2.1vw, 13px);
      letter-spacing: 0.19em;
      font-weight: 700;
      padding: 0 2px;
      text-transform: lowercase;
    }

    .controls {
      border: 1px solid #7f82a0;
      border-radius: 14px;
      overflow: hidden;
      background: linear-gradient(180deg, #d2d4e0 0%, #c6c8d6 100%);
    }

    .controls summary {
      list-style: none;
      cursor: pointer;
      padding: 11px 13px;
      font-weight: 700;
      color: #2f3259;
      font-size: clamp(14px, 3vw, 16px);
      user-select: none;
    }

    .controls summary::-webkit-details-marker {
      display: none;
    }

    .controls summary::after {
      content: "▾";
      float: right;
      transition: transform 140ms ease;
      color: #40457a;
    }

    .controls[open] summary::after {
      transform: rotate(180deg);
    }

    .controls-content {
      border-top: 1px solid #9b9db2;
      padding: 10px;
      display: grid;
      gap: 10px;
    }

    .meta {
      background: #e5e6ed;
      border: 1px solid #acafc4;
      border-radius: 10px;
      padding: 9px 10px;
      display: grid;
      gap: 5px;
    }

    .meta p {
      margin: 0;
      color: #4a4d68;
      font-size: clamp(13px, 2.8vw, 14px);
      word-break: break-word;
    }

    .meta strong {
      color: #2e3251;
    }

    .actions {
      display: flex;
      gap: 9px;
      flex-wrap: wrap;
    }

    button {
      appearance: none;
      -webkit-appearance: none;
      border: 1px solid #4555aa;
      background: var(--button);
      color: #f1f4ff;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.2px;
      cursor: pointer;
      transition: background 140ms ease, border-color 140ms ease, opacity 140ms ease;
      box-shadow: 0 2px 4px rgba(34, 36, 58, 0.2);
    }

    button:hover {
      background: var(--button-hover);
      border-color: #3c4c9f;
    }

    button:disabled {
      opacity: 0.66;
      cursor: not-allowed;
    }

    .danger {
      border-color: #914242;
      background: var(--button-danger);
      color: #fff2f2;
    }

    .danger:hover {
      background: var(--button-danger-hover);
      border-color: #823a3a;
    }

    .history {
      border: 1px solid #a8abbd;
      border-radius: 10px;
      background: #ececf2;
      max-height: min(52vh, 390px);
      overflow: auto;
    }

    .history-empty {
      color: #6e718c;
      font-size: 14px;
      padding: 12px;
    }

    .history-head,
    .history-row {
      display: grid;
      grid-template-columns: 58px 1fr 1fr;
      gap: 8px;
      align-items: center;
      padding: 8px 10px;
      font-size: 13px;
    }

    .history-head {
      position: sticky;
      top: 0;
      z-index: 1;
      background: var(--history-head);
      color: #454b6f;
      border-bottom: 1px solid #a7abc2;
      font-weight: 800;
      letter-spacing: 0.2px;
    }

    .history-row {
      color: #3d415e;
      border-bottom: 1px solid #d4d6e4;
      background: var(--history-row);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 12.5px;
    }

    .history-row:nth-child(even) {
      background: #e7e8ee;
    }

    .history-row:last-child {
      border-bottom: 0;
    }

    .history-turn {
      color: #555a7d;
      font-weight: 700;
      text-align: right;
      padding-right: 2px;
    }

    .history-move {
      min-height: 16px;
    }

    @media (max-width: 700px) {
      .player-strip {
        min-height: 76px;
      }

      .controls {
        border-radius: 12px;
      }

      .actions button {
        flex: 1 1 auto;
      }
    }

    @media (max-width: 520px) {
      body {
        padding: 8px;
      }

      .player-strip {
        border-radius: 12px;
        padding: 8px 10px;
      }

      .board-card {
        border-radius: 14px;
        padding: 9px;
      }

      .history-head,
      .history-row {
        grid-template-columns: 48px 1fr 1fr;
        gap: 6px;
        padding: 7px 8px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="app-head">
      <h1 class="app-title">GameFactory Chess</h1>
    </header>

    <section class="player-strip" aria-label="Black player">
      <div class="player-main">
        <p class="player-name" id="topPlayerName">Black Player</p>
        <p class="player-sub">
          <span id="topPlayerTag">@user</span>
          <span class="pill waiting" id="topPlayerState">Waiting</span>
        </p>
      </div>
    </section>

    <section class="board-card">
      <p class="status" id="turnStatus">Loading board...</p>
      <div class="board-wrap">
        <div class="board" id="board"></div>
        <div class="coords">
          <span>a b c d e f g h</span>
          <span>8 7 6 5 4 3 2 1</span>
        </div>
      </div>
    </section>

    <section class="player-strip" aria-label="White player">
      <div class="player-main">
        <p class="player-name" id="bottomPlayerName">White Player</p>
        <p class="player-sub">
          <span id="bottomPlayerTag">@user</span>
          <span class="pill waiting" id="bottomPlayerState">Waiting</span>
        </p>
      </div>
    </section>

    <details class="controls" open>
      <summary>Match Controls &amp; History</summary>
      <div class="controls-content">
        <div class="actions">
          <button id="refreshBtn" type="button">Refresh</button>
          <button id="resignBtn" type="button" class="danger">Resign</button>
        </div>
        <div class="meta">
          <p><strong>Match ID:</strong> <span id="matchId">-</span></p>
          <p><strong>User ID:</strong> <span id="userId">-</span></p>
          <p><strong>Your Color:</strong> <span id="myColor">-</span></p>
        </div>
        <div class="history" id="history"></div>
      </div>
    </details>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
  <script>
    const PIECES = {
      P: "♙", N: "♘", B: "♗", R: "♖", Q: "♕", K: "♔",
      p: "♟", n: "♞", b: "♝", r: "♜", q: "♛", k: "♚",
    };
    const PIECE_ASSETS = {
      P: "/assets/chess-pieces/wp.svg",
      N: "/assets/chess-pieces/wn.svg",
      B: "/assets/chess-pieces/wb.svg",
      R: "/assets/chess-pieces/wr.svg",
      Q: "/assets/chess-pieces/wq.svg",
      K: "/assets/chess-pieces/wk.svg",
      p: "/assets/chess-pieces/bp.svg",
      n: "/assets/chess-pieces/bn.svg",
      b: "/assets/chess-pieces/bb.svg",
      r: "/assets/chess-pieces/br.svg",
      q: "/assets/chess-pieces/bq.svg",
      k: "/assets/chess-pieces/bk.svg",
    };
    const FILES = ["a", "b", "c", "d", "e", "f", "g", "h"];
    const RANKS = ["8", "7", "6", "5", "4", "3", "2", "1"];
    const INITIAL_FEN = "rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1";

    const params = new URLSearchParams(window.location.search);
    const matchId = (params.get("match_id") || "").trim();
    const userId = (params.get("user_id") || "").trim();

    const boardEl = document.getElementById("board");
    const historyEl = document.getElementById("history");
    const turnStatusEl = document.getElementById("turnStatus");
    const refreshBtn = document.getElementById("refreshBtn");

    const topPlayerNameEl = document.getElementById("topPlayerName");
    const topPlayerTagEl = document.getElementById("topPlayerTag");
    const topPlayerStateEl = document.getElementById("topPlayerState");
    const bottomPlayerNameEl = document.getElementById("bottomPlayerName");
    const bottomPlayerTagEl = document.getElementById("bottomPlayerTag");
    const bottomPlayerStateEl = document.getElementById("bottomPlayerState");

    document.getElementById("matchId").textContent = matchId || "-";
    document.getElementById("userId").textContent = userId || "-";

    let chess = new Chess();
    let state = null;
    let myColor = null;
    let selectedSquare = null;
    let legalMoves = [];
    let lastFen = "";
    let pollTimer = null;
    let finished = false;
    let syncing = false;
    let pendingForceRefresh = false;
    let stateRequestInFlight = null;

    function sqName(fileIndex, rankIndex) {
      return `${FILES[fileIndex]}${RANKS[rankIndex]}`;
    }

    function parseBoard(fen) {
      const [placement] = fen.split(" ");
      const rows = placement.split("/");
      const result = [];
      for (const row of rows) {
        const expanded = [];
        for (const ch of row) {
          if (/\d/.test(ch)) {
            const count = Number(ch);
            for (let i = 0; i < count; i += 1) expanded.push(null);
          } else {
            expanded.push(ch);
          }
        }
        result.push(expanded);
      }
      return result;
    }

    function updatePieceNode(cell, piece) {
      if (!piece) return;

      const fallback = document.createElement("span");
      fallback.className = "piece-fallback";
      fallback.textContent = PIECES[piece] || "";

      const assetSrc = PIECE_ASSETS[piece] || "";
      if (!assetSrc) {
        fallback.classList.add("show");
        cell.appendChild(fallback);
        return;
      }

      const img = document.createElement("img");
      img.className = "piece-img";
      img.src = assetSrc;
      img.alt = piece;
      img.loading = "lazy";
      img.decoding = "async";
      img.onerror = () => {
        img.remove();
        fallback.classList.add("show");
      };

      cell.appendChild(img);
      cell.appendChild(fallback);
    }

    function renderBoard() {
      boardEl.innerHTML = "";
      const board = parseBoard(chess.fen());
      for (let r = 0; r < 8; r += 1) {
        for (let f = 0; f < 8; f += 1) {
          const square = sqName(f, r);
          const piece = board[r][f];
          const cell = document.createElement("button");
          cell.type = "button";
          cell.className = `sq ${(r + f) % 2 === 0 ? "light" : "dark"}`;
          if (selectedSquare === square) cell.classList.add("selected");
          if (legalMoves.includes(square)) cell.classList.add("move");
          cell.dataset.square = square;
          updatePieceNode(cell, piece);
          cell.addEventListener("click", onSquareClick);
          boardEl.appendChild(cell);
        }
      }
    }

    function renderHistory(history) {
      historyEl.innerHTML = "";
      if (!history || history.length === 0) {
        const empty = document.createElement("div");
        empty.className = "history-empty";
        empty.textContent = "No moves yet.";
        historyEl.appendChild(empty);
        return;
      }

      const head = document.createElement("div");
      head.className = "history-head";
      head.innerHTML = "<div>#</div><div>White</div><div>Black</div>";
      historyEl.appendChild(head);

      for (let i = 0; i < history.length; i += 2) {
        const row = document.createElement("div");
        row.className = "history-row";

        const turn = document.createElement("div");
        turn.className = "history-turn";
        turn.textContent = `${Math.floor(i / 2) + 1}.`;

        const white = document.createElement("div");
        white.className = "history-move";
        white.textContent = String(history[i] || "");

        const black = document.createElement("div");
        black.className = "history-move";
        black.textContent = String(history[i + 1] || "");

        row.appendChild(turn);
        row.appendChild(white);
        row.appendChild(black);
        historyEl.appendChild(row);
      }
    }

    function setSyncing(isSyncing) {
      syncing = isSyncing;
      refreshBtn.disabled = isSyncing;
      refreshBtn.textContent = isSyncing ? "Syncing..." : "Refresh";
    }

    function setStatus(text, tone = "") {
      turnStatusEl.textContent = text;
      turnStatusEl.classList.remove("you-turn", "waiting", "error", "sync");
      if (tone) turnStatusEl.classList.add(tone);
    }

    function isMyTurn() {
      if (!state || !myColor) return false;
      return state.turn === myColor;
    }

    function updateTurnStatus() {
      if (finished) return;
      if (!state) {
        setStatus("Loading...", "sync");
        return;
      }
      if (state.status !== "active") {
        setStatus(`Match status: ${state.status}`, "sync");
        return;
      }
      if (!myColor) {
        setStatus("Spectator mode", "sync");
        return;
      }
      if (isMyTurn()) {
        setStatus("Your turn", "you-turn");
      } else {
        setStatus("Opponent's turn", "waiting");
      }
    }

    function setPlayerStateBadge(el, mode) {
      el.classList.remove("playing", "waiting", "offline");
      if (mode === "playing") {
        el.classList.add("playing");
        el.textContent = "Playing";
      } else if (mode === "offline") {
        el.classList.add("offline");
        el.textContent = "Not joined";
      } else {
        el.classList.add("waiting");
        el.textContent = "Waiting";
      }
    }

    function formatPlayerName(label, id) {
      if (!id || id === "-") return `${label} Player`;
      if (id === userId) return `You (${id})`;
      return `${label} ${id}`;
    }

    function updatePlayerCards() {
      if (!state) return;

      const challengerId = String(state.challenger_id || "-");
      const opponentId = state.opponent_id ? String(state.opponent_id) : "-";
      const hasOpponent = Boolean(state.opponent_id);

      const whiteId = state.challenger_color === "white" ? challengerId : opponentId;
      const blackId = state.challenger_color === "black" ? challengerId : opponentId;

      topPlayerNameEl.textContent = formatPlayerName("Black", blackId);
      topPlayerTagEl.textContent = blackId && blackId !== "-" ? `ID: ${blackId}` : "Waiting for player";

      bottomPlayerNameEl.textContent = formatPlayerName("White", whiteId);
      bottomPlayerTagEl.textContent = whiteId && whiteId !== "-" ? `ID: ${whiteId}` : "Waiting for player";

      if (!hasOpponent) {
        setPlayerStateBadge(topPlayerStateEl, "offline");
        setPlayerStateBadge(bottomPlayerStateEl, whiteId === userId ? "playing" : "waiting");
        return;
      }

      if (state.status !== "active") {
        setPlayerStateBadge(topPlayerStateEl, "waiting");
        setPlayerStateBadge(bottomPlayerStateEl, "waiting");
        return;
      }

      setPlayerStateBadge(topPlayerStateEl, state.turn === "black" ? "playing" : "waiting");
      setPlayerStateBadge(bottomPlayerStateEl, state.turn === "white" ? "playing" : "waiting");
    }

    function clearSelection() {
      selectedSquare = null;
      legalMoves = [];
    }

    function highlightMoves(from) {
      const moves = chess.moves({ square: from, verbose: true });
      legalMoves = moves.map((m) => m.to);
      selectedSquare = from;
    }

    async function postMove(from, to) {
      const move = chess.move({ from, to, promotion: "q" });
      if (!move) return false;
      const uci = `${move.from}${move.to}${move.promotion || ""}`;
      const response = await fetch("/chess_move", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          match_id: matchId,
          user_id: userId,
          move: uci,
          fen: chess.fen(),
        }),
      });
      const payload = await response.json().catch(() => ({}));
      if (!response.ok) {
        chess.undo();
        if (payload.error === "not_your_turn") {
          setStatus("Wait for opponent's move", "waiting");
        } else {
          setStatus("Move rejected by server", "error");
        }
        return false;
      }

      state.fen = payload.fen;
      state.turn = payload.turn;
      if (!Array.isArray(state.move_history)) state.move_history = [];
      state.move_history = [...state.move_history, uci];
      lastFen = payload.fen;
      return true;
    }

    async function postResult(winnerUserId) {
      if (finished) return;
      finished = true;
      await fetch("/chess_result", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          match_id: matchId,
          winner_user_id: winnerUserId,
        }),
      });
    }

    async function handleGameEnd() {
      if (chess.in_checkmate()) {
        const winner = chess.turn() === "w" ? "black" : "white";
        const winnerId = winner === myColor
          ? userId
          : (myColor === "white" ? String(state.opponent_id) : String(state.challenger_id));
        await postResult(winnerId);
        setStatus(winnerId === userId ? "You Won!" : "You Lost", "sync");
        return;
      }
      if (chess.in_stalemate() || chess.in_draw()) {
        await postResult("draw");
        setStatus("Draw. Bets refunded.", "sync");
      }
    }

    async function onSquareClick(event) {
      if (finished || !state || state.status !== "active") return;
      const square = event.currentTarget.dataset.square;
      if (!isMyTurn()) {
        setStatus("Wait for opponent's move", "waiting");
        return;
      }

      const piece = chess.get(square);
      if (!selectedSquare) {
        if (!piece) return;
        const mine = (myColor === "white" && piece.color === "w") || (myColor === "black" && piece.color === "b");
        if (!mine) return;
        highlightMoves(square);
        renderBoard();
        return;
      }

      if (square === selectedSquare) {
        clearSelection();
        renderBoard();
        return;
      }

      const from = selectedSquare;
      const validTarget = legalMoves.includes(square);
      clearSelection();

      if (!validTarget) {
        if (piece) {
          const mine = (myColor === "white" && piece.color === "w") || (myColor === "black" && piece.color === "b");
          if (mine) highlightMoves(square);
        }
        renderBoard();
        return;
      }

      const ok = await postMove(from, square);
      renderBoard();
      if (!ok) return;

      renderHistory((state.move_history || []).map(String));
      updateTurnStatus();
      updatePlayerCards();
      await handleGameEnd();
    }

    async function loadState(force = false) {
      if (stateRequestInFlight) {
        pendingForceRefresh = pendingForceRefresh || force;
        return stateRequestInFlight;
      }

      stateRequestInFlight = (async () => {
        if (!matchId) {
          setStatus("Missing match_id.", "error");
          return;
        }

        setSyncing(true);
        const response = await fetch(`/chess_state?match_id=${encodeURIComponent(matchId)}&t=${Date.now()}`, {
          cache: "no-store",
          headers: {
            "Cache-Control": "no-cache",
            Pragma: "no-cache",
          },
        });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok || !payload.ok) {
          setStatus("Could not load match.", "error");
          return;
        }

        state = payload;
        if (!state.opponent_id) setStatus("Waiting for opponent to join.", "sync");

        if (String(state.challenger_id) === userId) {
          myColor = state.challenger_color || "white";
        } else if (String(state.opponent_id) === userId) {
          myColor = state.opponent_color || "black";
        } else {
          myColor = null;
        }

        document.getElementById("myColor").textContent = myColor ? myColor : "spectator";

        if (!state.fen) state.fen = INITIAL_FEN;

        if (force || state.fen !== lastFen) {
          chess.load(state.fen);
          lastFen = state.fen;
          clearSelection();
          renderBoard();
        }

        renderHistory((state.move_history || []).map(String));
        updateTurnStatus();
        updatePlayerCards();
      })();

      try {
        await stateRequestInFlight;
      } catch (_) {
        setStatus("Sync failed. Tap Refresh.", "error");
      } finally {
        stateRequestInFlight = null;
        setSyncing(false);
        if (pendingForceRefresh) {
          const shouldForce = pendingForceRefresh;
          pendingForceRefresh = false;
          void loadState(shouldForce);
        }
      }
    }

    refreshBtn.addEventListener("click", () => {
      void loadState(true);
    });

    document.getElementById("resignBtn").addEventListener("click", async () => {
      if (!state || !myColor || finished) return;
      const ok = window.confirm("Resign this match?");
      if (!ok) return;
      const winnerId = myColor === "white" ? String(state.opponent_id) : String(state.challenger_id);
      await postResult(winnerId);
      setStatus("You resigned.", "sync");
      updatePlayerCards();
    });

    void loadState(true).then(() => {
      pollTimer = setInterval(() => {
        if (!finished) void loadState(false);
      }, 1800);
    });
  </script>
</body>
</html>
