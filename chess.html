<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chess Board</title>
  <style>
    :root {
      --bg: #0e1512;
      --panel: #17251d;
      --line: #2a3a32;
      --text: #e7efe9;
      --muted: #9bb2a3;
      --accent: #7de08f;
      --light: #f1efd8;
      --dark: #5b7a64;
      --pick: #87ce89;
      --danger: #e36f6f;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: radial-gradient(circle at top, #1b2e25, var(--bg) 50%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 12px;
    }
    .wrap {
      width: 100%;
      max-width: 980px;
      display: grid;
      grid-template-columns: minmax(280px, 560px) minmax(240px, 360px);
      gap: 16px;
    }
    .board-panel,
    .side-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
    }
    .title {
      margin: 0 0 8px;
      font-size: 20px;
      letter-spacing: 0.3px;
    }
    .status {
      margin: 0 0 12px;
      color: var(--muted);
      min-height: 20px;
    }
    .board {
      width: 100%;
      aspect-ratio: 1 / 1;
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      border: 1px solid #24342c;
      overflow: hidden;
      border-radius: 10px;
      user-select: none;
      touch-action: manipulation;
    }
    .sq {
      position: relative;
      display: grid;
      place-items: center;
      font-size: clamp(28px, 4vw, 42px);
      cursor: pointer;
    }
    .sq.light {
      background: var(--light);
      color: #1f2937;
    }
    .sq.dark {
      background: var(--dark);
      color: #f8fafc;
    }
    .sq.selected {
      outline: 3px solid #ffe082;
      outline-offset: -3px;
    }
    .sq.move::after {
      content: "";
      width: 30%;
      height: 30%;
      border-radius: 999px;
      background: var(--pick);
      opacity: 0.88;
      position: absolute;
    }
    .coords {
      margin-top: 8px;
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 12px;
    }
    .meta p {
      margin: 5px 0;
      color: var(--muted);
      font-size: 14px;
      word-break: break-all;
    }
    .meta strong {
      color: var(--text);
    }
    .actions {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    button {
      border: 1px solid #355343;
      background: #1f3329;
      color: var(--text);
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover {
      background: #284135;
    }
    .danger {
      border-color: #6f2d2d;
      background: #552525;
      color: #ffd9d9;
    }
    .danger:hover {
      background: #6a2f2f;
    }
    .history {
      margin-top: 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #111a15;
      max-height: 360px;
      overflow: auto;
      padding: 8px 10px;
    }
    .history-item {
      font-size: 13px;
      color: var(--muted);
      padding: 4px 0;
      border-bottom: 1px solid #23342b;
    }
    .history-item:last-child {
      border-bottom: 0;
    }
    @media (max-width: 860px) {
      .wrap {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="board-panel">
      <h1 class="title">Chess Match</h1>
      <p class="status" id="turnStatus">Loading board...</p>
      <div class="board" id="board"></div>
      <div class="coords">
        <span>a b c d e f g h</span>
        <span>8 7 6 5 4 3 2 1</span>
      </div>
    </section>
    <aside class="side-panel">
      <div class="meta">
        <p><strong>Match ID:</strong> <span id="matchId">-</span></p>
        <p><strong>User ID:</strong> <span id="userId">-</span></p>
        <p><strong>Your Color:</strong> <span id="myColor">-</span></p>
      </div>
      <div class="actions">
        <button id="refreshBtn" type="button">Refresh</button>
        <button id="resignBtn" type="button" class="danger">Resign</button>
      </div>
      <div class="history" id="history"></div>
    </aside>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
  <script>
    const PIECES = {
      P: "♙", N: "♘", B: "♗", R: "♖", Q: "♕", K: "♔",
      p: "♟", n: "♞", b: "♝", r: "♜", q: "♛", k: "♚",
    };
    const FILES = ["a", "b", "c", "d", "e", "f", "g", "h"];
    const RANKS = ["8", "7", "6", "5", "4", "3", "2", "1"];

    const params = new URLSearchParams(window.location.search);
    const matchId = (params.get("match_id") || "").trim();
    const userId = (params.get("user_id") || "").trim();

    const boardEl = document.getElementById("board");
    const historyEl = document.getElementById("history");
    const turnStatusEl = document.getElementById("turnStatus");
    const myColorEl = document.getElementById("myColor");
    document.getElementById("matchId").textContent = matchId || "-";
    document.getElementById("userId").textContent = userId || "-";

    let chess = new Chess();
    let state = null;
    let myColor = null;
    let selectedSquare = null;
    let legalMoves = [];
    let lastFen = "";
    let pollTimer = null;
    let finished = false;

    function sqName(fileIndex, rankIndex) {
      return `${FILES[fileIndex]}${RANKS[rankIndex]}`;
    }

    function parseBoard(fen) {
      const [placement] = fen.split(" ");
      const rows = placement.split("/");
      const result = [];
      for (const row of rows) {
        const expanded = [];
        for (const ch of row) {
          if (/\d/.test(ch)) {
            const count = Number(ch);
            for (let i = 0; i < count; i += 1) expanded.push(null);
          } else {
            expanded.push(ch);
          }
        }
        result.push(expanded);
      }
      return result;
    }

    function renderBoard() {
      boardEl.innerHTML = "";
      const board = parseBoard(chess.fen());
      for (let r = 0; r < 8; r += 1) {
        for (let f = 0; f < 8; f += 1) {
          const square = sqName(f, r);
          const piece = board[r][f];
          const cell = document.createElement("button");
          cell.type = "button";
          cell.className = `sq ${(r + f) % 2 === 0 ? "light" : "dark"}`;
          if (selectedSquare === square) {
            cell.classList.add("selected");
          }
          if (legalMoves.includes(square)) {
            cell.classList.add("move");
          }
          cell.dataset.square = square;
          cell.textContent = piece ? PIECES[piece] : "";
          cell.addEventListener("click", onSquareClick);
          boardEl.appendChild(cell);
        }
      }
    }

    function renderHistory(history) {
      historyEl.innerHTML = "";
      if (!history || history.length === 0) {
        historyEl.textContent = "No moves yet.";
        return;
      }
      history.forEach((mv, idx) => {
        const row = document.createElement("div");
        row.className = "history-item";
        row.textContent = `${idx + 1}. ${mv}`;
        historyEl.appendChild(row);
      });
    }

    function setStatus(text) {
      turnStatusEl.textContent = text;
    }

    function isMyTurn() {
      if (!state || !myColor) return false;
      return state.turn === myColor;
    }

    function updateTurnStatus() {
      if (finished) return;
      if (!state) {
        setStatus("Loading...");
        return;
      }
      if (state.status !== "active") {
        setStatus(`Match status: ${state.status}`);
        return;
      }
      if (isMyTurn()) {
        setStatus("Your turn");
      } else {
        setStatus("Opponent's turn");
      }
    }

    function clearSelection() {
      selectedSquare = null;
      legalMoves = [];
    }

    function highlightMoves(from) {
      const moves = chess.moves({ square: from, verbose: true });
      legalMoves = moves.map((m) => m.to);
      selectedSquare = from;
    }

    async function postMove(from, to) {
      let move = chess.move({ from, to, promotion: "q" });
      if (!move) return false;
      const uci = `${move.from}${move.to}${move.promotion || ""}`;
      const response = await fetch("/chess_move", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          match_id: matchId,
          user_id: userId,
          move: uci,
          fen: chess.fen(),
        }),
      });
      const payload = await response.json().catch(() => ({}));
      if (!response.ok) {
        chess.undo();
        if (payload.error === "not_your_turn") {
          setStatus("Wait for opponent's move");
        } else {
          setStatus("Move rejected by server");
        }
        return false;
      }
      state.fen = payload.fen;
      state.turn = payload.turn;
      lastFen = payload.fen;
      return true;
    }

    async function postResult(winnerUserId) {
      if (finished) return;
      finished = true;
      await fetch("/chess_result", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          match_id: matchId,
          winner_user_id: winnerUserId,
        }),
      });
    }

    async function handleGameEnd() {
      if (chess.in_checkmate()) {
        const winner = chess.turn() === "w" ? "black" : "white";
        const winnerId = winner === myColor
          ? userId
          : (myColor === "white" ? String(state.opponent_id) : String(state.challenger_id));
        await postResult(winnerId);
        setStatus(winnerId === userId ? "You Won!" : "You Lost");
        return;
      }
      if (chess.in_stalemate() || chess.in_draw()) {
        await postResult("draw");
        setStatus("Draw. Bets refunded.");
      }
    }

    async function onSquareClick(event) {
      if (finished || !state || state.status !== "active") return;
      const square = event.currentTarget.dataset.square;
      if (!isMyTurn()) {
        setStatus("Wait for opponent's move");
        return;
      }
      const piece = chess.get(square);
      if (!selectedSquare) {
        if (!piece) return;
        const mine = (myColor === "white" && piece.color === "w") || (myColor === "black" && piece.color === "b");
        if (!mine) return;
        highlightMoves(square);
        renderBoard();
        return;
      }
      if (square === selectedSquare) {
        clearSelection();
        renderBoard();
        return;
      }
      const from = selectedSquare;
      const validTarget = legalMoves.includes(square);
      clearSelection();
      if (!validTarget) {
        if (piece) {
          const mine = (myColor === "white" && piece.color === "w") || (myColor === "black" && piece.color === "b");
          if (mine) highlightMoves(square);
        }
        renderBoard();
        return;
      }
      const ok = await postMove(from, square);
      renderBoard();
      if (!ok) return;
      renderHistory(chess.history({ verbose: false }).map(String));
      updateTurnStatus();
      await handleGameEnd();
    }

    async function loadState(force = false) {
      if (!matchId) {
        setStatus("Missing match_id.");
        return;
      }
      const response = await fetch(`/chess_state?match_id=${encodeURIComponent(matchId)}`);
      const payload = await response.json().catch(() => ({}));
      if (!response.ok || !payload.ok) {
        setStatus("Could not load match.");
        return;
      }
      state = payload;
      if (!state.opponent_id) {
        setStatus("Waiting for opponent to join.");
      }
      if (String(state.challenger_id) === userId) {
        myColor = state.challenger_color || "white";
      } else if (String(state.opponent_id) === userId) {
        myColor = state.opponent_color || "black";
      } else {
        myColor = null;
      }
      myColorEl.textContent = myColor ? myColor : "spectator";
      if (!state.fen) {
        state.fen = "rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1";
      }
      if (force || state.fen !== lastFen) {
        chess.load(state.fen);
        lastFen = state.fen;
        clearSelection();
        renderBoard();
      }
      renderHistory((state.move_history || []).map(String));
      updateTurnStatus();
    }

    document.getElementById("refreshBtn").addEventListener("click", () => loadState(true));
    document.getElementById("resignBtn").addEventListener("click", async () => {
      if (!state || !myColor || finished) return;
      const ok = window.confirm("Resign this match?");
      if (!ok) return;
      const winnerId = myColor === "white"
        ? String(state.opponent_id)
        : String(state.challenger_id);
      await postResult(winnerId);
      setStatus("You resigned.");
    });

    loadState(true).then(() => {
      pollTimer = setInterval(() => {
        if (!finished) loadState(false);
      }, 3000);
    });
  </script>
</body>
</html>
