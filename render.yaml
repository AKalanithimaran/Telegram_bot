services:
  - type: web
    name: telegram-gambling-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    healthCheckPath: /health
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: MONGO_URI
        sync: false
      - key: WEBHOOK_URL
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: TON_DEPOSIT_ADDRESS
        sync: false
      - key: TON_API_KEY
        sync: false
      - key: TONCENTER_API_URL
        value: https://toncenter.com/api/v2
      - key: WITHDRAWAL_FEE_PERCENT
        value: "5.0"
      - key: MIN_WAGER_THRESHOLD
        value: "1000.0"
      - key: PORT
        value: "8000"
      - key: WEBHOOK_SECRET
        sync: false
