<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PvP Chess</title>
  <style>
    :root {
      --bg: #f3ede2;
      --panel: rgba(255,255,255,0.88);
      --ink: #1e1a17;
      --accent: #a53f2b;
      --dark: #73533b;
      --light: #f2d8b4;
      --board-size: min(92vw, 560px);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.65), transparent 30%),
        linear-gradient(135deg, #d9c3a0, #f3ede2 45%, #c6a37a);
      color: var(--ink);
      min-height: 100vh;
    }
    .wrap {
      width: min(1100px, 100%);
      margin: 0 auto;
      padding: 24px 16px 48px;
    }
    .hero {
      display: grid;
      gap: 18px;
      grid-template-columns: 1.2fr .8fr;
      align-items: start;
    }
    .card {
      background: var(--panel);
      border: 1px solid rgba(80, 44, 24, 0.14);
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 16px 50px rgba(48, 29, 14, 0.14);
      backdrop-filter: blur(8px);
    }
    .title {
      font-size: clamp(2rem, 5vw, 3.5rem);
      line-height: 1;
      margin: 0 0 10px;
      letter-spacing: .03em;
    }
    .subtitle { margin: 0; color: #54463a; }
    .pill-row, .time-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }
    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 16px;
      font-size: 0.95rem;
      cursor: pointer;
      background: #ead3aa;
      color: #2b241e;
      transition: transform .15s ease, background .2s ease;
    }
    button:hover { transform: translateY(-1px); }
    button.primary { background: var(--accent); color: #fff; }
    button.ghost { background: #efe6d7; }
    button:disabled { opacity: .45; cursor: not-allowed; transform: none; }
    .layout {
      display: grid;
      grid-template-columns: minmax(280px, 320px) 1fr;
      gap: 18px;
      margin-top: 18px;
      align-items: start;
    }
    .board-shell {
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .board {
      width: var(--board-size);
      height: var(--board-size);
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      border-radius: 20px;
      overflow: hidden;
      border: 8px solid #7a573d;
      box-shadow: 0 20px 60px rgba(55, 30, 14, 0.2);
    }
    .square {
      border-radius: 0;
      border: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(1.6rem, 4vw, 3rem);
      user-select: none;
      position: relative;
    }
    .light { background: var(--light); }
    .dark { background: var(--dark); color: #fff7ec; }
    .square.selected { outline: 4px solid #0e8f73; outline-offset: -4px; }
    .square.legal::after {
      content: "";
      width: 24%;
      height: 24%;
      border-radius: 50%;
      background: rgba(14, 143, 115, 0.72);
      position: absolute;
    }
    .players {
      display: grid;
      gap: 12px;
    }
    .player {
      border-radius: 18px;
      padding: 14px 16px;
      background: #f5ebda;
      border: 1px solid rgba(76, 45, 22, 0.1);
    }
    .player.active { border-color: var(--accent); box-shadow: inset 0 0 0 2px rgba(165,63,43,0.12); }
    .label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: .08em; color: #715f50; }
    .name { font-size: 1.1rem; margin-top: 4px; }
    .clock { font-size: 1.5rem; margin-top: 10px; }
    .status {
      margin-top: 14px;
      padding: 12px 14px;
      background: #f7f1e7;
      border-radius: 16px;
      min-height: 72px;
      white-space: pre-line;
    }
    .meta { font-size: .95rem; color: #5f5347; }
    .hidden { display: none; }
    @media (max-width: 880px) {
      .hero, .layout { grid-template-columns: 1fr; }
      .board { width: min(94vw, 520px); height: min(94vw, 520px); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div class="card">
        <h1 class="title">PvP Chess Arena</h1>
        <p class="subtitle">Open your match page, pick the time, and start instantly. No extra login.</p>
        <div class="pill-row">
          <button id="joinBtn" class="primary">Join Match</button>
          <button id="resignBtn" class="ghost hidden">Resign</button>
        </div>
        <div id="timePanel" class="time-row hidden">
          <button data-seconds="180">3 Min</button>
          <button data-seconds="300">5 Min</button>
          <button data-seconds="600">10 Min</button>
        </div>
      </div>
      <div class="card">
        <div class="meta" id="matchMeta">Loading match...</div>
        <div class="status" id="statusBox">Connecting to chess server...</div>
      </div>
    </div>

    <div class="layout">
      <div class="players">
        <div class="player" id="whiteBox">
          <div class="label">White</div>
          <div class="name" id="whiteName">-</div>
          <div class="clock" id="whiteClock">--:--</div>
        </div>
        <div class="player" id="blackBox">
          <div class="label">Black</div>
          <div class="name" id="blackName">-</div>
          <div class="clock" id="blackClock">--:--</div>
        </div>
      </div>
      <div class="board-shell">
        <div id="board" class="board"></div>
      </div>
    </div>
  </div>

  <script>
    const token = '__MATCH_TOKEN__';
    const params = new URLSearchParams(window.location.search);
    const seat = params.get('seat') || '';
    const auth = params.get('auth') || '';
    const joinBtn = document.getElementById('joinBtn');
    const resignBtn = document.getElementById('resignBtn');
    const timePanel = document.getElementById('timePanel');
    const statusBox = document.getElementById('statusBox');
    const matchMeta = document.getElementById('matchMeta');
    const boardEl = document.getElementById('board');
    const whiteBox = document.getElementById('whiteBox');
    const blackBox = document.getElementById('blackBox');
    const whiteName = document.getElementById('whiteName');
    const blackName = document.getElementById('blackName');
    const whiteClock = document.getElementById('whiteClock');
    const blackClock = document.getElementById('blackClock');

    let selectedSquare = null;
    let legalMoves = {};
    let currentState = null;
    let pollTimer = null;

    const pieceIcons = {
      P: '♙', N: '♘', B: '♗', R: '♖', Q: '♕', K: '♔',
      p: '♟', n: '♞', b: '♝', r: '♜', q: '♛', k: '♚'
    };

    function squareColor(file, rank) {
      return (file + rank) % 2 === 0 ? 'light' : 'dark';
    }

    function boardSquares() {
      const squares = [];
      const files = ['a','b','c','d','e','f','g','h'];
      for (let rank = 8; rank >= 1; rank--) {
        for (let file = 0; file < 8; file++) {
          squares.push(files[file] + rank);
        }
      }
      return seat === 'black' ? squares.reverse() : squares;
    }

    function formatClock(total) {
      if (total === null || total === undefined) return '--:--';
      const mins = Math.floor(total / 60).toString().padStart(2, '0');
      const secs = Math.floor(total % 60).toString().padStart(2, '0');
      return `${mins}:${secs}`;
    }

    function setStatus(text) {
      statusBox.textContent = text;
    }

    function renderBoard() {
      if (!currentState) return;
      boardEl.innerHTML = '';
      const pieces = currentState.piece_map || {};
      const allowedTargets = selectedSquare ? (legalMoves[selectedSquare] || []).map(v => v.split(':')[0]) : [];
      boardSquares().forEach((squareName, idx) => {
        const file = idx % 8;
        const rank = Math.floor(idx / 8);
        const square = document.createElement('button');
        square.type = 'button';
        square.className = `square ${squareColor(file, rank)}`;
        square.dataset.square = squareName;
        if (selectedSquare === squareName) square.classList.add('selected');
        if (allowedTargets.includes(squareName)) square.classList.add('legal');
        square.textContent = pieceIcons[pieces[squareName]] || '';
        square.addEventListener('click', () => handleSquareClick(squareName));
        boardEl.appendChild(square);
      });
    }

    async function api(path, method = 'GET', body = null) {
      const options = { method, headers: {} };
      if (body) {
        options.headers['Content-Type'] = 'application/json';
        options.body = JSON.stringify(body);
      }
      const res = await fetch(path, options);
      if (!res.ok) {
        const data = await res.json().catch(() => ({ detail: 'Request failed.' }));
        throw new Error(data.detail || 'Request failed.');
      }
      return res.json();
    }

    async function fetchState() {
      if (!seat || !auth) {
        setStatus('Invalid match link.');
        joinBtn.disabled = true;
        return;
      }
      try {
        const state = await api(`/api/chess/${token}/state?seat=${encodeURIComponent(seat)}&auth=${encodeURIComponent(auth)}`);
        currentState = state;
        legalMoves = state.legal_moves || {};
        whiteName.textContent = state.white.name;
        blackName.textContent = state.black.name;
        whiteClock.textContent = formatClock(state.white.time_left);
        blackClock.textContent = formatClock(state.black.time_left);
        whiteBox.classList.toggle('active', state.turn === 'white');
        blackBox.classList.toggle('active', state.turn === 'black');
        matchMeta.textContent = `Match #${state.match_id} • You are ${seat}`;
        renderBoard();
        renderStateUI(state);
      } catch (err) {
        setStatus(err.message);
      }
    }

    function renderStateUI(state) {
      const messages = state.messages && state.messages.length ? state.messages.join('\n') : 'Match ready.';
      if (state.status === 'lobby') {
        timePanel.classList.remove('hidden');
        resignBtn.classList.add('hidden');
        joinBtn.disabled = state[seat]?.joined;
        setStatus(messages + '\n\nJoin both players and choose time to begin.');
      } else if (state.status === 'active') {
        timePanel.classList.add('hidden');
        resignBtn.classList.remove('hidden');
        joinBtn.disabled = true;
        setStatus(messages + `\n\nTurn: ${state.turn}`);
      } else {
        timePanel.classList.add('hidden');
        resignBtn.classList.add('hidden');
        joinBtn.disabled = true;
        const winnerText = state.winner ? `Winner user id: ${state.winner}` : 'Draw';
        setStatus(`Game finished.\n${winnerText}\nReason: ${state.result_reason || '-'}`);
      }
    }

    async function handleSquareClick(squareName) {
      if (!currentState || currentState.status !== 'active' || currentState.turn !== seat) return;
      const piece = currentState.piece_map[squareName];
      if (!selectedSquare) {
        if (piece && legalMoves[squareName]) {
          selectedSquare = squareName;
          renderBoard();
        }
        return;
      }

      if (selectedSquare === squareName) {
        selectedSquare = null;
        renderBoard();
        return;
      }

      const moveOptions = legalMoves[selectedSquare] || [];
      const direct = moveOptions.find(v => v.split(':')[0] === squareName);
      if (!direct) {
        if (piece && legalMoves[squareName]) {
          selectedSquare = squareName;
          renderBoard();
        }
        return;
      }

      const promotion = direct.includes(':') ? direct.split(':')[1] : 'q';
      try {
        await api(`/api/chess/${token}/move`, 'POST', {
          seat,
          auth,
          from: selectedSquare,
          to: squareName,
          promotion
        });
        selectedSquare = null;
        await fetchState();
      } catch (err) {
        selectedSquare = null;
        renderBoard();
        setStatus(err.message);
      }
    }

    joinBtn.addEventListener('click', async () => {
      try {
        await api(`/api/chess/${token}/join`, 'POST', { seat, auth });
        joinBtn.disabled = true;
        await fetchState();
      } catch (err) {
        setStatus(err.message);
      }
    });

    resignBtn.addEventListener('click', async () => {
      try {
        await api(`/api/chess/${token}/resign`, 'POST', { seat, auth });
        await fetchState();
      } catch (err) {
        setStatus(err.message);
      }
    });

    timePanel.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', async () => {
        try {
          await api(`/api/chess/${token}/time`, 'POST', {
            seat,
            auth,
            seconds: Number(btn.dataset.seconds)
          });
          await fetchState();
        } catch (err) {
          setStatus(err.message);
        }
      });
    });

    async function start() {
      if (!seat || !auth) {
        setStatus('This link is incomplete. Open the assigned match link from Telegram.');
        return;
      }
      await fetchState();
      pollTimer = setInterval(fetchState, 2000);
    }

    start();
  </script>
</body>
</html>
